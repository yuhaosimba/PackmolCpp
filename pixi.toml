[workspace]
name = "packmolc-tests"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
cmake = ">=3.27,<4"
ninja = ">=1.12,<2"
python = ">=3.11,<3.13"
gfortran_linux-64 = ">=14,<15"
julia = ">=1.12,<1.13"

[tasks.configure]
cmd = "cmake -S . -B build -G Ninja -DBUILD_TESTING=ON"

[tasks.build]
depends-on = ["configure"]
cmd = "cmake --build build"

[tasks.inventory]
cmd = "python scripts/generate_inventory.py --root . --write"

[tasks.test-unit]
depends-on = ["build"]
cmd = "ctest --test-dir build --output-on-failure -L unit"

[tasks.test-component]
depends-on = ["build"]
cmd = "ctest --test-dir build --output-on-failure -L component"

[tasks.test-gencan]
depends-on = ["build"]
cmd = "ctest --test-dir build --output-on-failure -L gencan"

[tasks.test-regression]
depends-on = ["build"]
cmd = "ctest --test-dir build --output-on-failure -L regression"

[tasks.test-all]
depends-on = ["inventory", "build"]
cmd = "ctest --test-dir build --output-on-failure"
